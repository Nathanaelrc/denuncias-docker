# =============================================
# Portal de Denuncias EPCO - Docker Compose
# Servicios: Apache/PHP + MySQL + phpMyAdmin
# =============================================

services:
  # =============================================
  # Aplicación PHP/Apache - Portal de Denuncias
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: denuncias-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8091}:80"
    volumes:
      - ./logs:/var/www/html/logs:z
      - ./public/uploads:/var/www/html/public/uploads:z
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-denuncias}
      - DB_USER=${DB_USER:-denuncias_user}
      - DB_PASS=${DB_PASS:-cambiar-db-pass}
      - DB_CHARSET=utf8mb4
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL:-http://localhost:8091}
      - TZ=America/Santiago
      # Clave de encriptación (CAMBIAR EN PRODUCCIÓN)
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-cambiar-esta-clave-en-produccion-32chars!}
      # SMTP
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-denuncias@epco.cl}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Canal de Denuncias - EPCO}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - denuncias-network

  # =============================================
  # Base de Datos MySQL
  # =============================================
  db:
    image: mysql:8.0
    container_name: denuncias-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cambiar-root-pass}
      MYSQL_DATABASE: ${DB_NAME:-denuncias}
      MYSQL_USER: ${DB_USER:-denuncias_user}
      MYSQL_PASSWORD: ${DB_PASS:-cambiar-db-pass}
      TZ: America/Santiago
    volumes:
      - denuncias-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:z
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - denuncias-network

  # =============================================
  # phpMyAdmin (solo desarrollo)
  # =============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: denuncias-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8092}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-cambiar-root-pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - denuncias-network
    profiles:
      - dev

volumes:
  denuncias-db-data:

networks:
  denuncias-network:
    driver: bridge
