# =============================================
# Portal de Denuncias Empresa Portuaria Coquimbo - Docker Compose
# Servicios: Apache/PHP + MySQL + phpMyAdmin
# =============================================

services:
  # =============================================
  # Aplicación PHP/Apache - Portal de Denuncias
  # =============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: denuncias-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9091}:80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./public/uploads:/var/www/html/public/uploads
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-denuncias}
      - DB_USER=${DB_USER:-denuncias_user}
      - DB_PASS=${DB_PASS:-cambiar-db-pass}
      - DB_CHARSET=utf8mb4
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL:-http://localhost:9091}
      - LANDING_URL=${LANDING_URL:-http://localhost:9090}
      - APP_URL_GENERAL=${APP_URL_GENERAL:-http://localhost:9093}
      - TZ=America/Santiago
      # Clave de encriptación (CAMBIAR EN PRODUCCIÓN)
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-cambiar-esta-clave-en-produccion-32chars!}
      # SMTP
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-denuncias@epco.cl}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Canal de Denuncias - Empresa Portuaria Coquimbo}
      - SMTP_ADMIN_EMAIL=${SMTP_ADMIN_EMAIL:-}
      # Verificación SSL del servidor SMTP (true en producción, false solo con certs autofirmados)
      - SMTP_VERIFY_SSL=${SMTP_VERIFY_SSL:-true}
      # Token para el endpoint /salud (dejar vacío para deshabilitar protección)
      - HEALTH_CHECK_TOKEN=${HEALTH_CHECK_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - denuncias-network

  # =============================================
  # Base de Datos MySQL
  # =============================================
  db:
    image: mysql:8.4
    container_name: denuncias-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cambiar-root-pass}
      MYSQL_DATABASE: ${DB_NAME:-denuncias}
      MYSQL_USER: ${DB_USER:-denuncias_user}
      MYSQL_PASSWORD: ${DB_PASS:-cambiar-db-pass}
      TZ: America/Santiago
    volumes:
      - denuncias-db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --mysql-native-password=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - denuncias-network

  # =============================================
  # Portal de Denuncias (Generales)
  # =============================================
  app-generales:
    build:
      context: ./denuncias-generales
      dockerfile: Dockerfile
    container_name: denuncias-generales-app
    restart: unless-stopped
    ports:
      - "${APP_GENERALES_PORT:-9093}:80"
    volumes:
      - ./denuncias-generales/logs:/var/www/html/logs
      - ./denuncias-generales/public/uploads:/var/www/html/public/uploads
    environment:
      - DB_HOST=db-generales
      - DB_NAME=${DB_GENERALES_NAME:-denuncias_generales}
      - DB_USER=${DB_GENERALES_USER:-generales_user}
      - DB_PASS=${DB_GENERALES_PASS:-cambiar-db-pass}
      - DB_CHARSET=utf8mb4
      - APP_ENV=${APP_ENV:-production}
      - APP_URL=${APP_URL_GENERAL:-http://localhost:9093}
      - LANDING_URL=${LANDING_URL:-http://localhost:9090}
      - APP_URL_KARIN=${APP_URL:-http://localhost:9091}
      - TZ=America/Santiago
      - ENCRYPTION_KEY=${GENERALES_ENCRYPTION_KEY:-cambiar-clave-generales-32chars!}
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-denuncias@epco.cl}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Portal Ciudadano - Empresa Portuaria Coquimbo}
      - SMTP_ADMIN_EMAIL=${SMTP_ADMIN_EMAIL:-}
      - SMTP_VERIFY_SSL=${SMTP_VERIFY_SSL:-true}
      - HEALTH_CHECK_TOKEN=${HEALTH_CHECK_TOKEN:-}
    depends_on:
      db-generales:
        condition: service_healthy
    networks:
      - denuncias-network

  # =============================================
  # Base de Datos MySQL - Portal Ciudadano
  # =============================================
  db-generales:
    image: mysql:8.4
    container_name: denuncias-generales-db
    restart: unless-stopped
    ports:
      - "${DB_GENERALES_PORT:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-cambiar-root-pass}
      MYSQL_DATABASE: ${DB_GENERALES_NAME:-denuncias_generales}
      MYSQL_USER: ${DB_GENERALES_USER:-generales_user}
      MYSQL_PASSWORD: ${DB_GENERALES_PASS:-cambiar-db-pass}
      TZ: America/Santiago
    volumes:
      - denuncias-generales-db-data:/var/lib/mysql
      - ./denuncias-generales/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --mysql-native-password=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - denuncias-network

  # =============================================
  # Landing Page - Selector de Portales
  # =============================================
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: denuncias-landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-9090}:80"
    environment:
      - APP_URL_KARIN=${APP_URL:-http://localhost:9091}
      - APP_URL_GENERAL=${APP_URL_GENERAL:-http://localhost:9093}
      - TZ=America/Santiago
    networks:
      - denuncias-network

  # =============================================
  # phpMyAdmin (solo desarrollo)
  # =============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: denuncias-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-9092}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-cambiar-root-pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - denuncias-network
    profiles:
      - dev

volumes:
  denuncias-db-data:
  denuncias-generales-db-data:

networks:
  denuncias-network:
    driver: bridge
