# =============================================
# Portal de Denuncias Empresa Portuaria Coquimbo - Nginx Reverse Proxy
#
# Punto de entrada único (puerto 9090):
#   /            → Landing (selector de portales)
#   /karin/      → Portal Ley Karin   (app:80)
#   /generales/  → Portal Ciudadano   (app-generales:80)
#
# sub_filter reescribe los href/src/action root-relative en las respuestas HTML.
# PHP ahora envía rutas completas con prefijo de portal en los redirects,
# por lo que proxy_redirect está desactivado (off).
#
# USO DEL RESOLVER:
# Se usa el DNS interno de Docker (127.0.0.11) con variables en proxy_pass
# para forzar re-resolución dinámica. Esto evita el problema de IPs cacheadas
# si los containers de backend se reinician y obtienen nuevas IPs.
# =============================================

events {
    worker_connections 1024;
}

http {
    # DNS interno de Docker — re-resuelve hostnames cada 30s
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Buffers suficientes para que sub_filter procese respuestas completas
    proxy_buffering    on;
    proxy_buffer_size  16k;
    proxy_buffers      8 32k;
    proxy_busy_buffers_size 64k;

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------
        # Redirecciones sin barra final
        # -----------------------------------------------
        location = /karin {
            return 301 $scheme://$http_host/karin/;
        }
        location = /generales {
            return 301 $scheme://$http_host/generales/;
        }

        # -----------------------------------------------
        # Portal Ley Karin  →  app:80
        # -----------------------------------------------
        location /karin/ {
            set $karin_upstream "app";
            rewrite ^/karin/(.*)$ /$1 break;
            proxy_pass         http://$karin_upstream:80;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Deshabilitar compresión del backend para que sub_filter pueda procesar
            proxy_set_header   Accept-Encoding   "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # PHP envía rutas con prefijo completo (/karin/panel), no se modifica Location
            proxy_redirect off;

            # Reescribir URLs root-relative dentro del HTML de respuesta
            sub_filter_once off;
            sub_filter 'href="/'   'href="/karin/';
            sub_filter "href='/"   "href='/karin/";
            sub_filter 'action="/' 'action="/karin/';
            sub_filter "action='/" "action='/karin/";
            sub_filter 'src="/'    'src="/karin/';
            # Corregir llamadas fetch() en JavaScript embebido en HTML
            sub_filter "fetch('/"  "fetch('/karin/";
            sub_filter 'fetch("/'  'fetch("/karin/';
        }

        # -----------------------------------------------
        # Portal Ciudadano (Generales)  →  app-generales:80
        # -----------------------------------------------
        location /generales/ {
            set $generales_upstream "app-generales";
            rewrite ^/generales/(.*)$ /$1 break;
            proxy_pass         http://$generales_upstream:80;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Accept-Encoding   "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            proxy_redirect off;

            sub_filter_once off;
            sub_filter 'href="/'   'href="/generales/';
            sub_filter "href='/"   "href='/generales/";
            sub_filter 'action="/' 'action="/generales/';
            sub_filter "action='/" "action='/generales/";
            sub_filter 'src="/'    'src="/generales/';
            sub_filter "fetch('/"  "fetch('/generales/";
            sub_filter 'fetch("/'  'fetch("/generales/';
        }

        # -----------------------------------------------
        # Landing (selector de portales)  →  landing:80
        # -----------------------------------------------
        location / {
            set $landing_upstream "landing";
            proxy_pass         http://$landing_upstream:80;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
