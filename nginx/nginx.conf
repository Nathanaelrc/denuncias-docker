# =============================================
# Portal de Denuncias Empresa Portuaria Coquimbo - Nginx Reverse Proxy
#
# Punto de entrada único (puerto 9090):
#   /            → Landing (selector de portales)
#   /karin/      → Portal Ley Karin   (app:80)
#   /generales/  → Portal Ciudadano   (app-generales:80)
#
# sub_filter reescribe los href/src/action root-relative en las respuestas HTML.
# proxy_redirect reescribe las cabeceras Location de los redirects PHP.
# =============================================

events {
    worker_connections 1024;
}

http {
    # Buffers suficientes para que sub_filter procese respuestas completas
    proxy_buffering    on;
    proxy_buffer_size  16k;
    proxy_buffers      8 32k;
    proxy_busy_buffers_size 64k;

    server {
        listen 80;
        server_name _;

        # -----------------------------------------------
        # Redirecciones sin barra final
        # -----------------------------------------------
        location = /karin {
            return 301 $scheme://$http_host/karin/;
        }
        location = /generales {
            return 301 $scheme://$http_host/generales/;
        }

        # -----------------------------------------------
        # Portal Ley Karin  →  app:80
        # -----------------------------------------------
        location /karin/ {
            proxy_pass         http://app:80/;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Deshabilitar compresión del backend para que sub_filter pueda procesar
            proxy_set_header   Accept-Encoding   "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # Reescribir cabeceras Location de redirects PHP (p.ej. /panel → /karin/panel)
            proxy_redirect ~^http://[^/]+/(.*) $scheme://$http_host/karin/$1;

            # Reescribir URLs root-relative dentro del HTML de respuesta
            sub_filter_once off;
            sub_filter 'href="/'   'href="/karin/';
            sub_filter "href='/"   "href='/karin/";
            sub_filter 'action="/' 'action="/karin/';
            sub_filter "action='/" "action='/karin/";
            sub_filter 'src="/'    'src="/karin/';
            # Corregir llamadas fetch() en JavaScript embebido en HTML
            sub_filter "fetch('/"  "fetch('/karin/";
            sub_filter 'fetch("/'  'fetch("/karin/';
        }

        # -----------------------------------------------
        # Portal Ciudadano (Generales)  →  app-generales:80
        # -----------------------------------------------
        location /generales/ {
            proxy_pass         http://app-generales:80/;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Accept-Encoding   "";
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            proxy_redirect ~^http://[^/]+/(.*) $scheme://$http_host/generales/$1;

            sub_filter_once off;
            sub_filter 'href="/'   'href="/generales/';
            sub_filter "href='/"   "href='/generales/";
            sub_filter 'action="/' 'action="/generales/';
            sub_filter "action='/" "action='/generales/";
            sub_filter 'src="/'    'src="/generales/';
            sub_filter "fetch('/"  "fetch('/generales/";
            sub_filter 'fetch("/'  'fetch("/generales/';
        }

        # -----------------------------------------------
        # Landing (selector de portales)  →  landing:80
        # -----------------------------------------------
        location / {
            proxy_pass         http://landing:80;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
