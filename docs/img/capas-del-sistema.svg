<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Capas del sistema</title>
  <desc id="desc">Vista por capas de la solucion en ambos canales.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#edf4fa"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7990a1"/>
    </marker>
    <style>
      .h1 { font: 800 34px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#173a55; }
      .sub { font: 500 19px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#60798c; }
      .lane { fill:#fff; stroke:#cfdeea; stroke-width:2; rx:20; }
      .num { font:800 22px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#fff; }
      .ttl { font:800 36px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#1d3f5b; }
      .txt { font:500 20px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#4f687a; }
      .chip { fill:#eaf3fb; }
      .chipt { font:700 15px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#1a6591; }
      .line { stroke:#7990a1; stroke-width:3.5; fill:none; marker-end:url(#arr); }
    </style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <text x="56" y="62" class="h1">Capas del sistema</text>
  <text x="56" y="92" class="sub">Misma base tecnica en ambos canales, con reglas distintas por dominio.</text>

  <rect x="70" y="130" width="1140" height="105" class="lane"/>
  <circle cx="115" cy="182" r="24" fill="#1a6591"/><text x="107" y="190" class="num">1</text>
  <text x="160" y="174" class="ttl" style="font-size:39px;">Acceso y routing</text>
  <text x="160" y="206" class="txt">Entrada publica y enrutamiento a cada portal.</text>
  <rect x="940" y="156" width="140" height="28" rx="14" class="chip"/><text x="958" y="175" class="chipt">nginx.conf</text>
  <rect x="1092" y="156" width="104" height="28" rx="14" class="chip"/><text x="1108" y="175" class="chipt">compose</text>

  <path d="M640 235 L640 260" class="line"/>

  <rect x="70" y="270" width="1140" height="105" class="lane"/>
  <circle cx="115" cy="322" r="24" fill="#2380b0"/><text x="107" y="330" class="num">2</text>
  <text x="160" y="314" class="ttl" style="font-size:39px;">Presentacion</text>
  <text x="160" y="346" class="txt">Landing, formularios, login, seguimiento y panel.</text>
  <rect x="900" y="296" width="120" height="28" rx="14" class="chip"/><text x="930" y="315" class="chipt">public/*</text>
  <rect x="1032" y="296" width="164" height="28" rx="14" class="chip"/><text x="1048" y="315" class="chipt">generales/public/*</text>

  <path d="M640 375 L640 400" class="line"/>

  <rect x="70" y="410" width="1140" height="105" class="lane"/>
  <circle cx="115" cy="462" r="24" fill="#0f9ac5"/><text x="107" y="470" class="num">3</text>
  <text x="160" y="454" class="ttl" style="font-size:39px;">Contexto y seguridad</text>
  <text x="160" y="486" class="txt">Sesion, CSRF, captcha, roles y autenticacion.</text>
  <rect x="930" y="436" width="128" height="28" rx="14" class="chip"/><text x="950" y="455" class="chipt">bootstrap.php</text>
  <rect x="1070" y="436" width="126" height="28" rx="14" class="chip"/><text x="1095" y="455" class="chipt">app.php</text>

  <path d="M640 515 L640 540" class="line"/>

  <rect x="70" y="550" width="1140" height="105" class="lane"/>
  <circle cx="115" cy="602" r="24" fill="#1a6591"/><text x="107" y="610" class="num">4</text>
  <text x="160" y="594" class="ttl" style="font-size:39px;">Servicios de negocio</text>
  <text x="160" y="626" class="txt">Denuncias, cifrado, notificaciones y conflicto de interes.</text>
  <rect x="870" y="576" width="144" height="28" rx="14" class="chip"/><text x="890" y="595" class="chipt">utilidades.php</text>
  <rect x="1028" y="576" width="168" height="28" rx="14" class="chip"/><text x="1045" y="595" class="chipt">encriptacion.php</text>

  <path d="M640 655 L640 680" class="line"/>

  <rect x="70" y="690" width="1140" height="105" class="lane"/>
  <circle cx="115" cy="742" r="24" fill="#587386"/><text x="107" y="750" class="num">5</text>
  <text x="160" y="734" class="ttl" style="font-size:39px;">Persistencia y operacion</text>
  <text x="160" y="766" class="txt">Base de datos, salud de servicio, scripts y respaldos.</text>
  <rect x="880" y="716" width="138" height="28" rx="14" class="chip"/><text x="900" y="735" class="chipt">database.php</text>
  <rect x="1030" y="716" width="166" height="28" rx="14" class="chip"/><text x="1052" y="735" class="chipt">database/init.sql</text>
</svg>
