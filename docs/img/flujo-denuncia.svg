<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de ingreso de denuncia</title>
  <desc id="desc">Secuencia desde el formulario publico hasta el almacenamiento cifrado, adjuntos, notificaciones y entrega del codigo de seguimiento.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6c8291"/>
    </marker>
    <style>
      .title { font: 800 34px 'Segoe UI', Arial, sans-serif; fill: #12344d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #607789; }
      .card { fill: #ffffff; stroke: #d8e4ed; stroke-width: 2; rx: 24; }
      .step { font: 800 22px 'Segoe UI', Arial, sans-serif; fill: #16364d; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4c6574; }
      .small { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #6a8190; }
      .num { font: 800 22px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #6c8291; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="860" fill="url(#bg)"/>
  <text x="90" y="72" class="title">Flujo de ingreso de una denuncia</text>
  <text x="90" y="105" class="subtitle">Desde el formulario publico hasta el codigo final que permite hacer seguimiento.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="215" height="250" class="card"/>
    <circle cx="110" cy="210" r="26" fill="#1a6591"/>
    <text x="101" y="218" class="num">1</text>
    <text x="110" y="265" class="step">Ingreso al portal</text>
    <text x="110" y="300" class="text">La persona entra desde</text>
    <text x="110" y="326" class="text">la landing o una URL</text>
    <text x="110" y="352" class="text">directa al formulario.</text>
    <text x="110" y="392" class="small">Archivos</text>
    <text x="110" y="414" class="text">landing/public/index.php</text>
    <text x="110" y="438" class="text">public/nueva_denuncia.php</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="320" y="170" width="215" height="250" class="card"/>
    <circle cx="360" cy="210" r="26" fill="#2380b0"/>
    <text x="351" y="218" class="num">2</text>
    <text x="360" y="265" class="step">Validacion inicial</text>
    <text x="360" y="300" class="text">CSRF, captcha,</text>
    <text x="360" y="326" class="text">descripcion minima,</text>
    <text x="360" y="352" class="text">anonima o identificada.</text>
    <text x="360" y="392" class="small">Portal ciudadano</text>
    <text x="360" y="414" class="text">exige fecha y lugar.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="570" y="170" width="215" height="250" class="card"/>
    <circle cx="610" cy="210" r="26" fill="#0f9ac5"/>
    <text x="601" y="218" class="num">3</text>
    <text x="610" y="265" class="step">Armar caso</text>
    <text x="610" y="300" class="text">Se normalizan datos</text>
    <text x="610" y="326" class="text">del denunciante,</text>
    <text x="610" y="352" class="text">denunciado, testigos</text>
    <text x="610" y="378" class="text">y evidencia.</text>
    <text x="610" y="414" class="small">Funcion central</text>
    <text x="610" y="436" class="text">createComplaint()</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="170" width="215" height="250" class="card"/>
    <circle cx="860" cy="210" r="26" fill="#1a6591"/>
    <text x="851" y="218" class="num">4</text>
    <text x="860" y="265" class="step">Cifrado y persistencia</text>
    <text x="860" y="300" class="text">Los campos sensibles</text>
    <text x="860" y="326" class="text">se cifran con sodium.</text>
    <text x="860" y="352" class="text">Se insertan complaint,</text>
    <text x="860" y="378" class="text">logs y tokens HMAC.</text>
    <text x="860" y="414" class="small">Tablas</text>
    <text x="860" y="436" class="text">complaints, complaint_logs,</text>
    <text x="860" y="460" class="text">complaint_conflict_tokens</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="170" width="215" height="250" class="card"/>
    <circle cx="1110" cy="210" r="26" fill="#2380b0"/>
    <text x="1101" y="218" class="num">5</text>
    <text x="1110" y="265" class="step">Adjuntos y avisos</text>
    <text x="1110" y="300" class="text">Si hay archivos, se</text>
    <text x="1110" y="326" class="text">guardan con nombre</text>
    <text x="1110" y="352" class="text">interno seguro.</text>
    <text x="1110" y="392" class="text">Tambien se disparan</text>
    <text x="1110" y="418" class="text">notificaciones internas</text>
    <text x="1110" y="442" class="text">y correos.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1320" y="170" width="215" height="250" class="card"/>
    <circle cx="1360" cy="210" r="26" fill="#0f9ac5"/>
    <text x="1351" y="218" class="num">6</text>
    <text x="1360" y="265" class="step">Codigo de seguimiento</text>
    <text x="1360" y="300" class="text">La pantalla final entrega</text>
    <text x="1360" y="326" class="text">un codigo con formato</text>
    <text x="1360" y="352" class="text">DN-YYYYMMDD-XXXXX.</text>
    <text x="1360" y="392" class="text">Ese codigo se usa luego</text>
    <text x="1360" y="418" class="text">en seguimiento publico.</text>
  </g>

  <path d="M285 295 L320 295" class="line"/>
  <path d="M535 295 L570 295" class="line"/>
  <path d="M785 295 L820 295" class="line"/>
  <path d="M1035 295 L1070 295" class="line"/>
  <path d="M1285 295 L1320 295" class="line"/>

  <g filter="url(#shadow)">
    <rect x="90" y="520" width="690" height="240" class="card"/>
    <text x="130" y="570" class="step">Datos protegidos durante el flujo</text>
    <text x="130" y="612" class="text">- descripcion del hecho</text>
    <text x="130" y="640" class="text">- datos del denunciante</text>
    <text x="130" y="668" class="text">- persona o entidad denunciada</text>
    <text x="130" y="696" class="text">- testigos, lugar, resolucion y notas</text>
    <text x="130" y="724" class="text">- nombre original de archivos adjuntos</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="520" width="690" height="240" class="card"/>
    <text x="860" y="570" class="step">Diferencias por portal</text>
    <text x="860" y="612" class="text">Ley Karin</text>
    <text x="860" y="640" class="text">- el usuario elige el tipo desde un catalogo funcional</text>
    <text x="860" y="684" class="text">Portal ciudadano</text>
    <text x="860" y="712" class="text">- el caso se guarda como tipo general</text>
    <text x="860" y="740" class="text">- fecha y lugar se vuelven obligatorios</text>
  </g>
</svg>