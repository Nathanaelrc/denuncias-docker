<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de ingreso de denuncia</title>
  <desc id="desc">Flujo desde el formulario hasta el codigo de seguimiento.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fcff"/>
      <stop offset="100%" stop-color="#edf4fa"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6f8899"/>
    </marker>
    <style>
      .h1 { font: 800 34px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#173a55; }
      .sub { font: 500 19px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#60798c; }
      .card { fill:#fff; stroke:#cfdeea; stroke-width:2; rx:18; }
      .n { font:800 22px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#fff; }
      .ttl { font:800 24px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#1d3f5b; }
      .txt { font:500 17px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#4f687a; }
      .line { stroke:#6f8899; stroke-width:3.5; fill:none; marker-end:url(#arr); }
    </style>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)"/>
  <text x="60" y="64" class="h1">Flujo de ingreso de denuncia</text>
  <text x="60" y="95" class="sub">Secuencia operacional en ambos canales, desde captura hasta seguimiento.</text>

  <rect x="70" y="160" width="190" height="190" class="card"/>
  <circle cx="105" cy="193" r="22" fill="#1a6591"/><text x="98" y="201" class="n">1</text>
  <text x="104" y="242" class="ttl">Ingreso</text>
  <text x="104" y="270" class="txt">Landing o URL</text>
  <text x="104" y="294" class="txt">directa al</text>
  <text x="104" y="318" class="txt">formulario.</text>

  <rect x="290" y="160" width="190" height="190" class="card"/>
  <circle cx="325" cy="193" r="22" fill="#2380b0"/><text x="318" y="201" class="n">2</text>
  <text x="324" y="242" class="ttl">Validacion</text>
  <text x="324" y="270" class="txt">CSRF, captcha,</text>
  <text x="324" y="294" class="txt">campos minimos</text>
  <text x="324" y="318" class="txt">y consistencia.</text>

  <rect x="510" y="160" width="190" height="190" class="card"/>
  <circle cx="545" cy="193" r="22" fill="#0f9ac5"/><text x="538" y="201" class="n">3</text>
  <text x="544" y="242" class="ttl">Estructura</text>
  <text x="544" y="270" class="txt">Se arma el caso</text>
  <text x="544" y="294" class="txt">con hechos,</text>
  <text x="544" y="318" class="txt">personas y fechas.</text>

  <rect x="730" y="160" width="190" height="190" class="card"/>
  <circle cx="765" cy="193" r="22" fill="#1a6591"/><text x="758" y="201" class="n">4</text>
  <text x="764" y="242" class="ttl">Cifrado</text>
  <text x="764" y="270" class="txt">Campos sensibles</text>
  <text x="764" y="294" class="txt">cifrados antes</text>
  <text x="764" y="318" class="txt">de guardar.</text>

  <rect x="950" y="160" width="190" height="190" class="card"/>
  <circle cx="985" cy="193" r="22" fill="#2380b0"/><text x="978" y="201" class="n">5</text>
  <text x="984" y="242" class="ttl">Adjuntos y avisos</text>
  <text x="984" y="270" class="txt">Archivos seguros,</text>
  <text x="984" y="294" class="txt">logs y correos</text>
  <text x="984" y="318" class="txt">de evento.</text>

  <rect x="1170" y="160" width="190" height="190" class="card"/>
  <circle cx="1205" cy="193" r="22" fill="#0f9ac5"/><text x="1198" y="201" class="n">6</text>
  <text x="1204" y="242" class="ttl">Codigo</text>
  <text x="1204" y="270" class="txt">Se entrega codigo</text>
  <text x="1204" y="294" class="txt">de seguimiento</text>
  <text x="1204" y="318" class="txt">del caso.</text>

  <path d="M260 255 L290 255" class="line"/>
  <path d="M480 255 L510 255" class="line"/>
  <path d="M700 255 L730 255" class="line"/>
  <path d="M920 255 L950 255" class="line"/>
  <path d="M1140 255 L1170 255" class="line"/>

  <rect x="90" y="430" width="590" height="300" class="card"/>
  <text x="120" y="480" class="ttl" style="font-size:31px;">Datos protegidos</text>
  <text x="120" y="520" class="txt">- descripcion del hecho</text>
  <text x="120" y="552" class="txt">- datos del denunciante (si aplica)</text>
  <text x="120" y="584" class="txt">- denunciado e involucrados</text>
  <text x="120" y="616" class="txt">- lugar, notas y resolucion</text>

  <rect x="720" y="430" width="590" height="300" class="card"/>
  <text x="750" y="480" class="ttl" style="font-size:31px;">Diferencias por canal</text>
  <text x="750" y="520" class="txt">Ley Karin: tipo de denuncia seleccionable.</text>
  <text x="750" y="554" class="txt">Portal General: tipo operativo general y categorias referenciales.</text>
  <text x="750" y="588" class="txt">Ambos: seguimiento por codigo y gestion interna.</text>
</svg>
