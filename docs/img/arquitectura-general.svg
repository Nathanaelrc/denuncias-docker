<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura general</title>
  <desc id="desc">Nginx como entrada unica, dos aplicaciones y dos bases de datos separadas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eaf2fa"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5d7688"/>
    </marker>
    <style>
      .h1 { font: 800 34px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill: #173a55; }
      .sub { font: 500 19px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill: #5e7789; }
      .box { fill: #fff; stroke: #cfdeea; stroke-width: 2; rx: 18; }
      .ttl { font: 800 26px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill: #1e3f5b; }
      .txt { font: 500 18px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill: #4f687a; }
      .pill { fill: #e9f3fb; }
      .pillt { font: 700 16px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill: #1a6591; }
      .line { stroke: #5d7688; stroke-width: 3.5; fill: none; marker-end: url(#arr); }
      .dash { stroke: #7f98aa; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arr); }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <text x="56" y="64" class="h1">Arquitectura general</text>
  <text x="56" y="94" class="sub">Entrada unica con Nginx, dos canales de denuncia y bases de datos separadas.</text>

  <rect x="60" y="140" width="190" height="80" class="box"/>
  <text x="155" y="184" text-anchor="middle" class="ttl" style="font-size:23px;">Usuario</text>

  <rect x="300" y="140" width="220" height="80" class="box"/>
  <text x="410" y="184" text-anchor="middle" class="ttl" style="font-size:23px;">Cliente web</text>

  <rect x="560" y="118" width="320" height="124" class="box"/>
  <rect x="608" y="148" width="224" height="36" rx="18" fill="#1a6591"/>
  <text x="720" y="172" text-anchor="middle" style="font:800 20px 'Google Sans Text','Noto Sans','Segoe UI',Arial,sans-serif; fill:#fff;">Nginx reverse proxy</text>
  <text x="584" y="210" class="txt" style="font-size:16px;">Rutas publicas: /, /karin y /generales</text>

  <path d="M250 180 L300 180" class="line"/>
  <path d="M520 180 L560 180" class="line"/>

  <rect x="80" y="300" width="300" height="130" class="box"/>
  <rect x="104" y="324" width="88" height="26" rx="13" class="pill"/>
  <text x="148" y="342" text-anchor="middle" class="pillt">Landing</text>
  <text x="104" y="377" class="ttl" style="font-size:30px;">Selector de portales</text>
  <text x="104" y="405" class="txt">Orienta al canal correcto.</text>

  <rect x="430" y="288" width="360" height="170" class="box"/>
  <rect x="456" y="314" width="154" height="30" rx="15" class="pill"/>
  <text x="533" y="335" text-anchor="middle" class="pillt">Portal Ley Karin</text>
  <text x="456" y="376" class="ttl">Aplicacion PHP + Apache</text>
  <text x="456" y="404" class="txt">Formularios, login, panel y detalle.</text>

  <rect x="840" y="288" width="360" height="170" class="box"/>
  <rect x="866" y="314" width="224" height="30" rx="15" class="pill"/>
  <text x="978" y="335" text-anchor="middle" class="pillt">Portal General/Ciudadano</text>
  <text x="866" y="376" class="ttl">Aplicacion PHP + Apache</text>
  <text x="866" y="404" class="txt">Misma base tecnica, reglas generales.</text>

  <path d="M720 242 L720 270" class="line"/>
  <path d="M720 270 L230 270 L230 300" class="dash"/>
  <path d="M720 270 L610 270 L610 288" class="line"/>
  <path d="M720 270 L1020 270 L1020 288" class="line"/>

  <rect x="110" y="560" width="240" height="88" class="box"/>
  <text x="230" y="603" text-anchor="middle" class="ttl" style="font-size:34px;">SMTP</text>
  <text x="230" y="626" text-anchor="middle" class="txt" style="font-size:15px;">Avisos internos y seguimiento</text>

  <g>
    <ellipse cx="610" cy="590" rx="170" ry="42" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <rect x="440" y="590" width="340" height="48" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <ellipse cx="610" cy="638" rx="170" ry="42" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <text x="610" y="608" text-anchor="middle" class="ttl" style="font-size:24px;">MySQL denuncias</text>
    <text x="610" y="630" text-anchor="middle" class="txt" style="font-size:15px;">Canal Ley Karin</text>
  </g>

  <g>
    <ellipse cx="1020" cy="590" rx="170" ry="42" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <rect x="850" y="590" width="340" height="48" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <ellipse cx="1020" cy="638" rx="170" ry="42" fill="#fff" stroke="#c6d6e2" stroke-width="2"/>
    <text x="1020" y="608" text-anchor="middle" class="ttl" style="font-size:24px;">MySQL denuncias_generales</text>
    <text x="1020" y="630" text-anchor="middle" class="txt" style="font-size:15px;">Canal General/Ciudadano</text>
  </g>

  <path d="M610 458 L610 548" class="line"/>
  <path d="M1020 458 L1020 548" class="line"/>
  <path d="M540 446 L350 588" class="dash"/>
  <path d="M930 446 L350 614" class="dash"/>
</svg>
